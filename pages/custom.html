<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="paginaTitulo">NG - Informações</title>
  <link rel="stylesheet" href="../css/comum.css">
  <link rel="manifest" href="../manifest.json">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px 80px;
    }
    .custom-container {
      max-width: 800px;
      width: 100%;
      animation: fadeIn 0.5s ease;
    }
    .custom-container h1 {
      color: var(--dourado);
      margin-bottom: 20px;
      text-align: center;
      font-size: 1.8em;
    }
    .custom-container .conteudo {
      color: var(--texto-secundario);
      line-height: 1.8;
      font-size: 1em;
    }
    .custom-container .conteudo h2,
    .custom-container .conteudo h3 {
      color: var(--dourado);
      margin-top: 25px;
      margin-bottom: 10px;
    }
    .custom-container .conteudo p {
      margin-bottom: 12px;
    }
    .custom-container .conteudo ul {
      margin-left: 20px;
      margin-bottom: 12px;
    }
    .custom-container .conteudo a {
      color: var(--dourado);
    }
    .btn-voltar {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 24px;
      background: transparent;
      border: 2px solid var(--borda-vidro);
      color: var(--dourado);
      padding: 8px 18px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      text-decoration: none;
    }
    .btn-voltar:hover {
      border-color: var(--dourado);
      background: rgba(255,215,0,0.08);
    }
    .erro-conteudo {
      text-align: center;
      color: var(--erro);
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="custom-container glass">
    <h1 id="conteudoTitulo">Carregando...</h1>
    <div id="conteudoCorpo" class="conteudo">
      <p>A carregar conteúdo...</p>
    </div>
    <button class="btn-voltar" onclick="history.back()">← Voltar</button>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || 'termos';

      const tituloEl = document.getElementById('conteudoTitulo');
      const corpoEl = document.getElementById('conteudoCorpo');
      const paginaTitulo = document.getElementById('paginaTitulo');

      // Mapear títulos amigáveis
      const titulos = {
        'termos': '📄 Termos de Uso',
        'privacidade': '🔒 Política de Privacidade',
        'regras': '📜 Regras Gerais'
      };

      const tituloAmigavel = titulos[id] || '📄 Informações';
      tituloEl.textContent = tituloAmigavel;
      paginaTitulo.textContent = `NG - ${tituloAmigavel.replace(/[📄🔒📜]/g, '').trim()}`;

      try {
        // Tenta primeiro como conteúdo de dica (regras, ajuda)
        const res = await api.getConteudo(id);
        if (res && !res.erro && res.conteudo) {
          corpoEl.innerHTML = res.conteudo;
          return;
        }
        // Se não houver conteúdo específico, tenta como página dinâmica
        const paginas = await api.listarPaginas();
        if (paginas && !paginas.erro && paginas.paginas) {
          const pagina = paginas.paginas.find(p => p.slug === id);
          if (pagina) {
            corpoEl.innerHTML = pagina.conteudo || '<p>Conteúdo em branco.</p>';
            return;
          }
        }
        // Fallback para conteúdo estático
        corpoEl.innerHTML = '<p>Conteúdo não disponível no momento. Por favor, entre em contacto com o suporte.</p>';
      } catch (err) {
        corpoEl.innerHTML = '<p class="erro-conteudo">Erro ao carregar conteúdo. Verifique sua ligação à internet.</p>';
      }
    })();
  </script>
</body>
</html>
