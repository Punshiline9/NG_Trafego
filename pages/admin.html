<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Gestor - NG</title>
  <link rel="stylesheet" href="../css/comum.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body>
  <div class="admin-painel glass" id="admin-painel-container">
    <h2>🛡️ Painel do Gestor — <span id="nomeGestor"></span></h2>

    <div class="abas">
      <button class="ativo" data-aba="aprovacoes">✅ Aprovações</button>
      <button data-aba="saques">💸 Saques</button>
      <button data-aba="tarefasAdmin">📝 Tarefas</button>
      <button data-aba="utilizadores">👥 Utilizadores</button>
      <button data-aba="niveis">📊 Níveis</button>
      <button data-aba="config">⚙️ Config</button>
      <button data-aba="paginas">📄 Páginas</button>
      <button data-aba="mensagens">✉️ Mensagens</button>
      <button data-aba="gestores">🛡️ Gestores</button>
      <button data-aba="bots">🤖 Bots</button>
      <button data-aba="podio">🏆 Pódio</button>
      <button onclick="logout()" style="margin-left:auto;">🚪 Sair</button>
    </div>

    <div id="aprovacoes" class="aba-painel"></div>
    <div id="saques" class="aba-painel oculto"></div>
    <div id="tarefasAdmin" class="aba-painel oculto"></div>
    <div id="utilizadores" class="aba-painel oculto"></div>
    <div id="niveis" class="aba-painel oculto"></div>
    <div id="config" class="aba-painel oculto"></div>
    <div id="paginas" class="aba-painel oculto"></div>
    <div id="mensagens" class="aba-painel oculto"></div>
    <div id="gestores" class="aba-painel oculto"></div>
    <div id="bots" class="aba-painel oculto"></div>
    <div id="podio" class="aba-painel oculto">
      <div class="card-form" style="text-align:center;">
        <h3>🏆 Gerar Pódio</h3>
        <p style="color:var(--texto-secundario);margin-bottom:20px;">Gera o pódio com os 3 melhores participantes e abre numa nova janela.</p>
        <button class="btn" id="btnGerarPodio" style="font-size:1.1em;padding:14px 30px;">🏆 Gerar Pódio</button>
      </div>
    </div>

    <div class="painel-rodape">
      <span class="selo-verificado">✔️ Verificado</span>
      © <span id="ano"></span> Pacheco Gonçalves — Todos os direitos reservados.
    </div>
  </div>

  <div class="creditos">
    <span class="selo-verificado">✔️ Verificado</span>
    © <span id="ano2"></span> Pacheco Gonçalves — Todos os direitos reservados.
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    document.getElementById('ano').textContent = new Date().getFullYear();
    document.getElementById('ano2').textContent = new Date().getFullYear();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js');
    }
  </script>
</body>
</html>
