<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha - NG</title>
  <link rel="stylesheet" href="../css/comum.css">
  <link rel="manifest" href="../manifest.json">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .recuperacao-container {
      max-width: 440px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    .recuperacao-container img {
      width: 70px;
      margin-bottom: 15px;
    }
    .recuperacao-container h2 {
      color: var(--dourado);
      margin-bottom: 8px;
      font-size: 1.5em;
    }
    .recuperacao-container p {
      color: var(--texto-secundario);
      margin-bottom: 24px;
      font-size: 0.9em;
      line-height: 1.5;
    }
    .recuperacao-container input {
      margin-bottom: 16px;
    }
    .recuperacao-container .btn {
      width: 100%;
      padding: 12px;
      font-size: 1em;
    }
    .mensagem {
      margin-top: 16px;
      font-weight: 600;
    }
    .link-login {
      display: block;
      margin-top: 20px;
      color: var(--dourado);
      text-decoration: none;
      font-size: 0.9em;
      font-weight: 500;
    }
    .link-login:hover {
      text-decoration: underline;
    }
    .logo-fallback {
      font-size: 3em;
      color: var(--dourado);
      display: none;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="recuperacao-container glass">
    <img src="../assets/imagens/logo.png" alt="NG Logo" id="logo-img"
         onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block';">
    <div id="logo-fallback" class="logo-fallback">⚜️</div>

    <h2>🔑 Recuperar Senha</h2>
    <p>Insira o seu email cadastrado. Enviaremos um link para redefinir a sua senha.</p>

    <input type="email" id="emailRecuperacao" placeholder="seu@email.com" autocomplete="email">
    <button class="btn" id="btnRecuperar">📧 Enviar Link</button>
    
    <div id="mensagemStatus" class="mensagem"></div>
    
    <a href="login.html" class="link-login">← Voltar ao Login</a>
  </div>

  <div class="creditos">
    <span class="selo-verificado">✔️ Verificado</span>
    © <span id="ano"></span> Pacheco Gonçalves — Todos os direitos reservados.
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script>
    document.getElementById('ano').textContent = new Date().getFullYear();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js');
    }

    const btn = document.getElementById('btnRecuperar');
    const msg = document.getElementById('mensagemStatus');

    btn.addEventListener('click', async () => {
      const email = document.getElementById('emailRecuperacao').value.trim();
      
      if (!email) {
        msg.textContent = '⚠️ Insira um email.';
        msg.className = 'mensagem erro';
        return;
      }

      if (!validarEmail(email)) {
        msg.textContent = '📧 Email inválido. Verifique o formato.';
        msg.className = 'mensagem erro';
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Enviando...';

      try {
        const res = await api.recuperarSenha(email);
        
        if (res.erro) {
          msg.textContent = res.erro;
          msg.className = 'mensagem erro';
        } else {
          msg.textContent = res.mensagem || '✅ Link de recuperação enviado! Verifique o seu email.';
          msg.className = 'mensagem sucesso';
          document.getElementById('emailRecuperacao').value = '';
        }
      } catch (err) {
        msg.textContent = '❌ Erro ao conectar. Verifique sua internet.';
        msg.className = 'mensagem erro';
      } finally {
        btn.disabled = false;
        btn.textContent = '📧 Enviar Link';
      }
    });

    // Enter para submeter
    document.getElementById('emailRecuperacao').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });
  </script>
</body>
</html>
